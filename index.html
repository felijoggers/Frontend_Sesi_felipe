<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore SESI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>TechStore SESI</h1>

        <section class="formulario">
            <h3>Dados da Venda</h3>
            <input type="text" id="inputNome" placeholder="Nome do cliente">
            <input type="number" id="inputIdade" placeholder="Idade do cliente">
            <input type="text" id="produtoSelecionado" placeholder="Produto selecionado" readonly>
            <input type="text" id="precoSelecionado" placeholder="Preço do produto" readonly>
            <select id="inputCupom">
                <option value="false">Não possui cupom</option>
                <option value="true">Possui cupom (15% OFF)</option>
            </select>
            <a href="estoque.html">
                <button type="button">Estoque</button>
            </a>
            <button onclick="executarSistema()">Finalizar Venda</button>
        </section>

        <hr>

        <section id="feedback">
            <p id="mensagem-autorizacao">Preencha os campos acima!</p>
            <ul id="lista-estoque"></ul>
            <div id="relatorio-final" class="card" style="display: none;">
            </div>
        </section>
    </div>
    <script src="script.js"></script>
    <script>
        window.onload = function(){
        
            const produto = localStorage.getItem("produtoSelecionado");
            const preco = localStorage.getItem("precoSelecionado");
        
            if(produto){
                document.getElementById("produtoSelecionado").value = produto;
            }
        
            if(preco){
                document.getElementById("precoSelecionado").value = "R$ " + Number(preco).toFixed(2);
            }
        
        }
        </script>
</body>
</html>
